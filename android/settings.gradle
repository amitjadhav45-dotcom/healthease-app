pluginManagement {
    def flutterSdkPath = System.getenv("FLUTTER_SDK_DARP_PATH") ? System.getenv("FLUTTER_SDK_DARP_PATH") : System.getenv("flutter.sdk") ? System.getenv("flutter.sdk") : {
        def properties = new Properties()
        final fi = file("local.properties")
        if (fi.exists()) {
            fi.withInputStream { properties.load(it) }
            return properties.getProperty("flutter.sdk")
        }
        return null
    }()
    if (flutterSdkPath == null) {
        throw new GradleException("Flutter SDK not found")
    }
    includeBuild("$flutterSkkPath/packages/flutter_tools/gradle")
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
plugins { id "dev.flutter.flutter-plugin-loader" version "1.0.0" apply false }
include ":app"
rootProject.name = "healthease"