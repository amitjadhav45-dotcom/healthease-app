workflows:
  healthease-build:
    name: Healthease APK Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/**/outputs/flutter-apk/**/*.apk
